<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Demo Reel — Ana María Vargas</title>

<style>

body{
    margin:0;
    background:black;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* ===== MARCO ===== */

.marco{
    width:90vw;
    height:90vh;
    background:#0d0d0d;
    padding:22px;
    box-sizing:border-box;
    border:1px dotted white;
    position:relative;
}

.marco::before{
    content:"";
    position:absolute;
    inset:6px;
    border:1px dotted rgba(255,255,255,.4);
    pointer-events:none;
}

.marco::after{
    content:"";
    position:absolute;
    inset:0;
    background-image:url("https://grainy-gradients.vercel.app/noise.svg");
    opacity:.07;
    mix-blend-mode:overlay;
    pointer-events:none;
}

/* ===== CONTENIDO ===== */

.hoja{
    width:100%;
    height:100%;
    border:1px dotted white;
    background:black;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.video-container{
    width:85%;
    display:flex;
    justify-content:center;
    align-items:center;
}

video{
    width:100%;
    max-width:1100px;
    height:auto;

    border:1px dotted rgba(255,255,255,.35);
}

/* ===== BOTÓN ===== */

.volver{

    margin-top:35px;

}

.volver a{

    background:white;
    color:black;

    text-decoration:none;

    padding:10px 18px;

    font-family:"Times New Roman", Georgia, serif;

    font-size:11px;

    letter-spacing:2px;

    border:1px dotted white;

}

.volver a:hover{

    background:black;
    color:white;

}

</style>

</head>

<body>

<div class="marco">

<div class="hoja">

<div class="video-container">

<video controls autoplay>

<source src="videos/demo_reel.mp4" type="video/mp4">

Tu navegador no soporta video.

</video>

</div>

<div class="volver">

<a href="index.html">← VOLVER AL ARCHIVO</a>

</div>

</div>

</div>

</body>
</html>
